name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'
  PNPM_VERSION: '9'

jobs:
  # ── 1. TypeScript & Build ──────────────────────────────────────────────────
  build:
    name: TypeScript & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Copy USWDS assets
        run: node scripts/setup-uswds.mjs

      - name: TypeScript check
        run: pnpm check

      - name: Build site
        run: pnpm build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 1

  # ── 2. HTML Validation ────────────────────────────────────────────────────
  html-validate:
    name: HTML Validation
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: HTML Validation
        # M3: wire up html-validate
        run: |
          echo "TODO (M3): npx html-validate 'dist/**/*.html'"
          echo "Gate placeholder — will fail on HTML errors in M3"

  # ── 3. Accessibility (axe-core) ───────────────────────────────────────────
  a11y:
    name: Accessibility (axe-core)
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Accessibility check
        # M3: wire up @axe-core/cli crawling the static site
        run: |
          echo "TODO (M3): npx serve dist & npx axe http://localhost:3000 --exit"
          echo "Gate placeholder — threshold: 0 violations, 0 serious warnings"

  # ── 4. Lighthouse CI ──────────────────────────────────────────────────────
  lighthouse:
    name: Lighthouse CI
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Lighthouse CI
        # M3: thresholds — perf≥90, a11y=100, best-practices≥95, SEO≥95
        run: |
          echo "TODO (M3): npx lhci autorun"
          echo "Gate placeholder — thresholds defined in lighthouserc.json"

  # ── 5. Link Check (lychee) ────────────────────────────────────────────────
  links:
    name: Link Check
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Check links
        # M3: wire up lychee for 0 broken internal + external links
        run: |
          echo "TODO (M3): lychee --offline dist/**/*.html"
          echo "Gate placeholder"

  # ── 6. Plain Language ─────────────────────────────────────────────────────
  plain-language:
    name: Plain Language (avg grade ≤ 8)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Plain language check
        # M3: scripts/plain-language.mjs — textstat fallback if no MCP
        run: |
          echo "TODO (M3): node scripts/plain-language.mjs"
          echo "Gate placeholder — threshold: avg Flesch-Kincaid grade ≤ 8"

  # ── 7. USWDS Compliance ───────────────────────────────────────────────────
  uswds-compliance:
    name: USWDS Compliance
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: USWDS compliance check
        # M3: scripts/compliance-check.mjs — verify banner + identifier present
        run: |
          echo "TODO (M3): node scripts/compliance-check.mjs"
          echo "Checking for required usa-banner..."
          grep -rl "usa-banner" dist/ | grep -q "." && echo "PASS: usa-banner found" || echo "FAIL: usa-banner missing"
          grep -rl "usa-identifier" dist/ | grep -q "." && echo "PASS: usa-identifier found" || echo "FAIL: usa-identifier missing"
