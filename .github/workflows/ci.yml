name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '22'
  PNPM_VERSION: '9'

jobs:
  # ── 1. TypeScript & Build ──────────────────────────────────────────────────
  build:
    name: TypeScript & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Copy USWDS assets
        run: node scripts/setup-uswds.mjs

      - name: TypeScript check
        run: pnpm check

      - name: Build site
        run: pnpm build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 1

  # ── 2. HTML Validation ─────────────────────────────────────────────────────
  html-validate:
    name: HTML Validation
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: HTML Validation
        run: npx html-validate 'dist/**/*.html'

  # ── 3. Accessibility (axe-core) ────────────────────────────────────────────
  a11y:
    name: Accessibility (axe-core)
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Start static server
        run: npx -y serve dist --listen 4000 &

      - name: Wait for server
        run: sleep 3

      - name: Accessibility check (axe-core)
        run: |
          npx -y @axe-core/cli \
            http://localhost:4000/ \
            http://localhost:4000/services/ \
            http://localhost:4000/help/ \
            http://localhost:4000/contact/ \
            --exit \
            --timeout 60000

  # ── 4. Lighthouse CI ───────────────────────────────────────────────────────
  lighthouse:
    name: Lighthouse CI
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Lighthouse CI
        uses: treosh/lighthouse-ci-action@v11
        with:
          configPath: ./lighthouserc.json
          uploadArtifacts: true
          temporaryPublicStorage: true

  # ── 5. Link Check (linkinator) ─────────────────────────────────────────────
  links:
    name: Link Check
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Start static server
        run: npx -y serve dist --listen 4001 &

      - name: Wait for server
        run: sleep 3

      - name: Check internal links
        run: |
          npx -y linkinator http://localhost:4001/ \
            --recurse \
            --skip "^(?!http://localhost)" \
            --skip "tel:" \
            --verbosity error

  # ── 6. Plain Language ──────────────────────────────────────────────────────
  plain-language:
    name: Plain Language (avg grade ≤ 8)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Plain language check
        run: node scripts/plain-language.mjs --verbose

  # ── 7. USWDS Compliance ────────────────────────────────────────────────────
  uswds-compliance:
    name: USWDS Compliance
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: USWDS compliance check
        run: node scripts/compliance-check.mjs --verbose
